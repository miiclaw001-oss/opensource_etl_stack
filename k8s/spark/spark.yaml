---
# Spark ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: spark
data:
  spark-defaults.conf: |
    # Iceberg configuration
    spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
    spark.sql.catalog.nessie.uri=http://nessie.nessie.svc.cluster.local:19120/api/v1
    spark.sql.catalog.nessie.ref=main
    spark.sql.catalog.nessie.authentication.type=NONE
    spark.sql.catalog.nessie.warehouse=s3://warehouse/

    # S3/MinIO configuration
    spark.hadoop.fs.s3a.endpoint=http://minio.minio.svc.cluster.local:9000
    spark.hadoop.fs.s3a.access.key=minioadmin
    spark.hadoop.fs.s3a.secret.key=minioadmin123
    spark.hadoop.fs.s3a.path.style.access=true
    spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

    # Performance tuning (laptop-friendly)
    spark.driver.memory=1g
    spark.executor.memory=1g
    spark.executor.cores=1
    spark.sql.shuffle.partitions=4
    spark.default.parallelism=4
    spark.ui.enabled=true

  log4j2.properties: |
    rootLogger.level = INFO
    rootLogger.appenderRef.stdout.ref = console
    appender.console.type = Console
    appender.console.name = console
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

---
# Spark Master Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: spark
  labels:
    app: spark
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: master
  template:
    metadata:
      labels:
        app: spark
        role: master
    spec:
      containers:
        - name: spark-master
          image: apache/spark:3.5.0-scala2.12-java17-python3-ubuntu
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.master.Master
          env:
            - name: SPARK_MASTER_HOST
              value: "0.0.0.0"
            - name: SPARK_MASTER_PORT
              value: "7077"
            - name: SPARK_MASTER_WEBUI_PORT
              value: "8080"
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          ports:
            - containerPort: 7077
              name: master
            - containerPort: 8080
              name: webui
          volumeMounts:
            - name: spark-config
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: spark-config
          configMap:
            name: spark-config

---
# Spark Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark
  labels:
    app: spark
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: worker
  template:
    metadata:
      labels:
        app: spark
        role: worker
    spec:
      containers:
        - name: spark-worker
          image: apache/spark:3.5.0-scala2.12-java17-python3-ubuntu
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master.spark.svc.cluster.local:7077
          env:
            - name: SPARK_WORKER_MEMORY
              value: "2g"
            - name: SPARK_WORKER_CORES
              value: "2"
            - name: SPARK_WORKER_WEBUI_PORT
              value: "8081"
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          ports:
            - containerPort: 8081
              name: webui
          volumeMounts:
            - name: spark-config
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: spark-config
          configMap:
            name: spark-config

---
# Spark Master Service
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: spark
spec:
  selector:
    app: spark
    role: master
  ports:
    - name: master
      port: 7077
      targetPort: 7077
    - name: webui
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# Spark History Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history
  namespace: spark
  labels:
    app: spark-history
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history
  template:
    metadata:
      labels:
        app: spark-history
    spec:
      containers:
        - name: spark-history
          image: apache/spark:3.5.0-scala2.12-java17-python3-ubuntu
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          env:
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.history.fs.logDirectory=s3a://warehouse/spark-logs
                -Dspark.hadoop.fs.s3a.endpoint=http://minio.minio.svc.cluster.local:9000
                -Dspark.hadoop.fs.s3a.access.key=minioadmin
                -Dspark.hadoop.fs.s3a.secret.key=minioadmin123
                -Dspark.hadoop.fs.s3a.path.style.access=true
          ports:
            - containerPort: 18080
              name: webui
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# Spark History Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: spark-history-nodeport
  namespace: spark
spec:
  selector:
    app: spark-history
  ports:
    - name: webui
      port: 18080
      targetPort: 18080
      nodePort: 30188
  type: NodePort
