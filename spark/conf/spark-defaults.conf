# =============================================================================
# Spark defaults for local ETL stack (Docker Compose / Kubernetes)
# =============================================================================

# Iceberg
spark.sql.extensions                          org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Polaris REST Catalog
spark.sql.catalog.polaris                     org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.polaris.type                rest
spark.sql.catalog.polaris.uri                 http://polaris:8181/api/catalog
spark.sql.catalog.polaris.warehouse           warehouse
spark.sql.catalog.polaris.credential          root:s3cr3t
spark.sql.catalog.polaris.scope               PRINCIPAL_ROLE:ALL

# MinIO / S3A
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.access.key               minioadmin
spark.hadoop.fs.s3a.secret.key               minioadmin123
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled   false

# Performance (laptop-friendly)
spark.driver.memory                          1g
spark.executor.memory                        1g
spark.executor.cores                         1
spark.sql.shuffle.partitions                 4
spark.default.parallelism                    4
spark.ui.enabled                             true

# Event logging (to MinIO)
spark.eventLog.enabled                       true
spark.eventLog.dir                           s3a://warehouse/spark-logs
spark.history.fs.logDirectory                s3a://warehouse/spark-logs

# Packages (loaded at runtime via spark-submit --packages)
# org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3
# org.apache.hadoop:hadoop-aws:3.3.4
# com.amazonaws:aws-java-sdk-bundle:1.12.262
