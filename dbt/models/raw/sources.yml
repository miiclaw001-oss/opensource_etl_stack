version: 2

sources:
  - name: iceberg_raw
    description: "Raw NYC Taxi data ingested via Airbyte into MinIO as Iceberg tables"
    schema: raw
    loader: airbyte
    tags: ["raw", "nyc_taxi", "iceberg"]

    tables:
      - name: nyc_taxi_trips
        description: "Raw NYC Yellow Taxi trip data - loaded from MinIO CSV/Parquet files"
        columns:
          - name: VendorID
            description: "TPEP provider ID: 1=Creative Mobile, 2=VeriFone"
            tests:
              - not_null
          - name: tpep_pickup_datetime
            description: "Trip pickup timestamp"
            tests:
              - not_null
          - name: tpep_dropoff_datetime
            description: "Trip dropoff timestamp"
            tests:
              - not_null
          - name: passenger_count
            description: "Number of passengers (driver-entered)"
          - name: trip_distance
            description: "Trip distance in miles"
          - name: RatecodeID
            description: "Rate code: 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group"
          - name: store_and_fwd_flag
            description: "Trip was held in vehicle memory before sending to vendor (Y/N)"
          - name: PULocationID
            description: "TLC Taxi Zone pickup location ID"
          - name: DOLocationID
            description: "TLC Taxi Zone dropoff location ID"
          - name: payment_type
            description: "Payment method: 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip"
          - name: fare_amount
            description: "Meter fare amount"
          - name: extra
            description: "Miscellaneous extras and surcharges"
          - name: mta_tax
            description: "MTA tax (0.50)"
          - name: tip_amount
            description: "Tip amount (auto-populated for credit card tips)"
          - name: tolls_amount
            description: "Total amount of all tolls paid"
          - name: improvement_surcharge
            description: "Improvement surcharge assessed trips at flagfall (0.30)"
          - name: total_amount
            description: "Total amount charged to passengers"
          - name: congestion_surcharge
            description: "Total amount collected for NYS congestion surcharge"
