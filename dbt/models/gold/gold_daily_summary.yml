version: 2

models:
  - name: gold_daily_summary
    description: >
      Gold layer daily+hourly summary of NYC taxi trips. Analytics-ready Iceberg table
      with revenue KPIs, volume metrics, tipping behavior, and peak-hour identification.
      Partitioned by pickup_date for efficient time-range queries.

    columns:
      - name: pickup_date
        description: "Trip date (partition key)"
        tests:
          - not_null

      - name: pickup_hour
        description: "Hour of day (0–23)"
        tests:
          - not_null

      - name: day_name
        description: "Day of week name"
        tests:
          - not_null

      - name: is_weekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null

      - name: time_of_day
        description: "Time bucket: morning_rush/midday/evening_rush/evening/overnight"
        tests:
          - not_null

      - name: trip_count
        description: "Number of trips in this hour"
        tests:
          - not_null

      - name: total_revenue
        description: "Sum of total_amount for this hour"
        tests:
          - not_null

      - name: avg_fare
        description: "Average fare amount"
        tests:
          - not_null

      - name: tip_rate_pct
        description: "Percentage of trips that received a tip"

      - name: credit_card_pct
        description: "Percentage of trips paid by credit card"

      - name: is_peak_hour
        description: "True if this hour is in the top 3 by trip volume for the day"
        tests:
          - not_null

      - name: revenue_per_trip
        description: "Total revenue divided by trip count"

      - name: rolling_7d_avg_trips
        description: "Rolling 7-day average trip count for the same hour"
